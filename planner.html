<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitPlan | Planner</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <h2>FitPlan</h2>
    <div>
      <a href="index.html">Dashboard</a>
      <a href="planner.html">Planner</a>
      <a href="nutrition.html">Nutrition</a>
    </div>
  </nav>

  <main class="container">
    <section class="hero">
      <h1>Workout Planner</h1>
      <p>Paste your full weekly routine once. FitPlan will organise it day by day.</p>
    </section>

    <section class="card">
      <h2>Paste Full Weekly Routine</h2>

      <textarea
        id="bulkRoutineInput"
        placeholder="Paste your full workout plan here..."
      ></textarea>

      <button id="autoBuildBtn">Build My Routine</button>
      <button id="clearAllBtn" class="clear-btn">Clear Routine</button>
    </section>

    <section class="card">
      <h2 id="todayTitle">Today</h2>
      <div id="todayWorkout"></div>
    </section>

    <section class="card">
      <h2>Full Weekly Routine</h2>
      <div id="weeklyRoutine"></div>
    </section>
  </main>

  <script src="js/planner.js"></script>
</body>
</html>
